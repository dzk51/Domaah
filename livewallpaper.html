<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Glass Clock Live Wallpaper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{ box-sizing: border-box; }
  html, body{
    width: 100%; height: 100%; margin: 0; padding: 0;
    background: #000; overflow: hidden;
    cursor: default;
    user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: 'Outfit', sans-serif;
  }

  .scene{
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 90% 70% at 50% 38%, #0b0b0d 0%, #000000 72%);
    overflow: hidden;
  }

  .scene::after{
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 120% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
    z-index: 4;
  }

  .smoke-layer{
    position: fixed; inset: -8%;
    width: 116%; height: 116%;
    pointer-events: none;
    z-index: 1;
    will-change: transform;
  }
  .smoke-svg{
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    mix-blend-mode: screen;
    opacity: 0.55;
  }
  .glow-blob{
    position: absolute;
    border-radius: 50%;
    filter: blur(50px);
    transform: translate(-50%, -50%);
  }

  @keyframes drift{
    0%   { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
    50%  { transform: translate(-50%, -50%) translate(20px, -15px) scale(1.05); }
    100% { transform: translate(-50%, -50%) translate(40px, -34px) scale(1); }
  }

  .bubbles-layer{
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  .bubble-wrap{
    position: absolute;
    will-change: transform;
  }
  .bubble{
    position: absolute; top: 0; left: 0;
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .bubble.ring{
    background: transparent;
    border: 1px solid rgba(255,255,255,0.28);
    box-shadow: inset 0 0 26px rgba(255,255,255,0.05);
  }
  .bubble.orb{
    border: 1px solid rgba(255,255,255,0.14);
    background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.07) 45%, rgba(255,255,255,0) 72%);
    box-shadow:
      inset -8px -8px 18px rgba(0,0,0,0.45),
      inset 6px 6px 16px rgba(255,255,255,0.08),
      0 0 26px rgba(255,255,255,0.05);
  }

  
  @keyframes floatBob{
    0%, 100% { transform: translate(-50%, -50%) translateY(0) translateX(0) rotate(0deg); }
    33%      { transform: translate(-50%, -50%) translateY(-15px) translateX(8px) rotate(4deg); }
    66%      { transform: translate(-50%, -50%) translateY(5px) translateX(-6px) rotate(-2deg); }
  }
  
 
  @keyframes pulseGlow{
    0%, 100% { filter: brightness(1) drop-shadow(0 0 0px rgba(255,255,255,0)); transform: translate(-50%, -50%) scale(1); }
    50%      { filter: brightness(1.4) drop-shadow(0 0 15px rgba(255,255,255,0.2)); transform: translate(-50%, -50%) scale(1.05); }
  }

  
  .clock-wrap{
    position: fixed;
    left: 50%; top: 50%;
    z-index: 5;
    will-change: transform;
  }
  .clock-glow{
    position: absolute; left: 50%; top: 50%;
    width: 170%; height: 220%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,255,255,0.12), rgba(255,255,255,0) 65%);
    filter: blur(45px);
    pointer-events: none;
    z-index: 0;
    animation: pulseGlow 10s ease-in-out infinite;
  }

   @keyframes glassPulse {
    0%, 100% { box-shadow: 0 25px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.15), 0 0 20px rgba(255,255,255,0); }
    50%      { box-shadow: 0 35px 75px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.3), 0 0 40px rgba(255,255,255,0.08); }
  }

  .clock-panel{
    position: relative;
    z-index: 1;
    padding: clamp(22px, 4vmin, 46px) clamp(34px, 7vmin, 76px);
    border-radius: clamp(20px, 3vmin, 30px);
    background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    text-align: center;
    overflow: hidden;
    animation: glassPulse 8s ease-in-out infinite;
  }
  .clock-panel::before{
    content: '';
    position: absolute; top: 0; left: 0;
    width: 65%; height: 65%;
    background: radial-gradient(circle at 18% 12%, rgba(255,255,255,0.25), transparent 60%);
    pointer-events: none;
  }
  .time{
    font-weight: 200;
    font-size: clamp(46px, 9vmin, 100px);
    letter-spacing: 2px;
    color: #f5f5f7;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 4px 24px rgba(255,255,255,0.15);
    position: relative; z-index: 1;
  }
  .date{
    margin-top: clamp(8px, 1.6vmin, 16px);
    font-weight: 500;
    font-size: clamp(13px, 2vmin, 19px);
    letter-spacing: clamp(2px, 0.5vmin, 4px);
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
    position: relative; z-index: 1;
  }

  @media (max-width: 480px){
    .time{ letter-spacing: 1px; }
  }
</style>
</head>
<body>

<div class="scene">

  <div class="smoke-layer" id="smokeLayer">
    <svg class="smoke-svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="smokeTurbulence" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.005 0.009" numOctaves="4" seed="11" result="noise">
            <animate attributeName="baseFrequency" dur="60s" values="0.005 0.009;0.008 0.006;0.005 0.009" repeatCount="indefinite" />
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="100" xChannelSelector="R" yChannelSelector="G" />
          <feGaussianBlur stdDeviation="4" />
        </filter>
        <linearGradient id="lineFade" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
          <stop offset="50%" stop-color="#ffffff" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <g filter="url(#smokeTurbulence)" opacity="0.6" stroke="url(#lineFade)" fill="none" stroke-linecap="round">
        <path d="M -100,680 C 120,560 260,760 480,600 C 680,440 840,560 1100,380" stroke-width="12"/>
        <path d="M -100,760 C 160,680 320,820 540,700 C 760,580 900,660 1100,520" stroke-width="8"/>
        <path d="M -50,520 C 180,420 300,560 520,460 C 720,360 880,420 1100,300" stroke-width="5"/>
        <path d="M 80,1020 C 260,900 380,960 560,840 C 740,720 880,760 1080,640" stroke-width="10"/>
        <path d="M -80,180 C 160,260 320,140 560,220 C 760,290 900,180 1100,260" stroke-width="4"/>
      </g>
    </svg>
    <div class="glow-blob" style="left:60%;top:35%;width:46vmin;height:46vmin;background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);animation:drift 60s ease-in-out infinite alternate;"></div>
    <div class="glow-blob" style="left:78%;top:55%;width:34vmin;height:34vmin;background:radial-gradient(circle, rgba(255,255,255,0.07), transparent 70%);animation:drift 80s ease-in-out infinite alternate-reverse;"></div>
  </div>

  <div class="bubbles-layer" id="bubblesLayer"></div>

  <div class="clock-wrap" id="clockWrap">
    <div class="clock-glow"></div>
    <div class="clock-panel">
      <div class="time" id="timeText">00:00</div>
      <div class="date" id="dateText">&mdash;</div>
    </div>
  </div>

</div>

<script>
(function(){
  const bubblesLayer = document.getElementById('bubblesLayer');
  const clockWrap = document.getElementById('clockWrap');
  const smokeLayer = document.getElementById('smokeLayer');
  const timeText = document.getElementById('timeText');
  const dateText = document.getElementById('dateText');

  const dayNames = ['MINGGU','SENIN','SELASA','RABU','KAMIS','JUMAT','SABTU'];
  const monthNames = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];

  function updateClock(){
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    timeText.textContent = hh + ':' + mm;
    dateText.textContent = dayNames[now.getDay()] + ', ' + now.getDate() + ' ' + monthNames[now.getMonth()];
  }

  function tick(){
    updateClock();
    const now = new Date();
    setTimeout(tick, 1000 - now.getMilliseconds());
  }
  tick();

  
  function inExclusionZone(xPct, yPct){
    return xPct > 26 && xPct < 74 && yPct > 26 && yPct < 74;
  }

  function makeBubble(xPct, yPct, sizeVmin, depth, type, opacity, duration, delay){
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap';
    wrap.dataset.depth = depth;
    wrap.style.left = xPct + '%';
    wrap.style.top = yPct + '%';

    const el = document.createElement('div');
    el.className = 'bubble ' + type;
    el.style.width = sizeVmin + 'vmin';
    el.style.height = sizeVmin + 'vmin';
    el.style.opacity = opacity;
    el.style.animation = 'floatBob ' + duration + 's ease-in-out infinite' +
      (type === 'orb' ? ', pulseGlow ' + (duration * 1.2) + 's ease-in-out infinite' : '');
    el.style.animationDelay = '-' + delay + 's';

    wrap.appendChild(el);
    bubblesLayer.appendChild(wrap);
  }

  const heroes = [
    [7, 6, 17, 0.55, 'ring', 0.35],
    [14, 11, 12.5, 0.65, 'orb', 0.55],
    [76, 15, 9, 0.4, 'ring', 0.3],
    [85, 4, 6.5, 0.7, 'orb', 0.5],
    [87, 79, 17.5, 0.8, 'orb', 0.6],
    [19, 80, 11, 0.45, 'ring', 0.35],
    [4, 50, 6, 0.35, 'ring', 0.25],
    [62, 88, 7.5, 0.5, 'orb', 0.45]
  ];
  heroes.forEach(function(h){
    makeBubble(h[0], h[1], h[2], h[3], h[4], h[5], 7 + Math.random() * 5, Math.random() * 8);
  });


  let count = 0;
  let attempts = 0;
  while(count < 35 && attempts < 400){
    attempts++;
    const xPct = Math.random() * 96 + 2;
    const yPct = Math.random() * 96 + 2;
    if(inExclusionZone(xPct, yPct)) continue;
    const size = 1.5 + Math.random() * 5.5;
    const depth = Math.min(0.85, (size / 6.5) * 0.6 + Math.random() * 0.2 + 0.05);
    const type = Math.random() < 0.3 ? 'orb' : 'ring';
    const opacity = type === 'orb' ? (0.35 + Math.random() * 0.3) : (0.15 + Math.random() * 0.25);
    makeBubble(xPct, yPct, size, depth, type, opacity, 6 + Math.random() * 8, Math.random() * 9);
    count++;
  }

   let targetX = 0, targetY = 0, curX = 0, curY = 0, autoT = 0;

  window.addEventListener('mousemove', function(e){
    targetX = (e.clientX / window.innerWidth - 0.5) * 2;
    targetY = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  window.addEventListener('deviceorientation', function(e){
    if(e.gamma === null || e.beta === null) return;
    targetX = Math.max(-1, Math.min(1, e.gamma / 28));
    targetY = Math.max(-1, Math.min(1, (e.beta - 45) / 28));
  });

  function requestOrientationPermission(){
    if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
      DeviceOrientationEvent.requestPermission().catch(function(){});
    }
  }
  window.addEventListener('click', requestOrientationPermission, { once: true });
  window.addEventListener('touchstart', requestOrientationPermission, { once: true });

  const allWraps = [];
  document.querySelectorAll('.bubble-wrap').forEach(function(el){ allWraps.push(el); });

  function animate(){
    curX += (targetX - curX) * 0.055;
    curY += (targetY - curY) * 0.055;
    autoT += 0.0022;
    const autoX = Math.sin(autoT) * 0.2;
    const autoY = Math.cos(autoT * 0.75) * 0.15;
    const fx = curX + autoX;
    const fy = curY + autoY;

    for(let i = 0; i < allWraps.length; i++){
      const el = allWraps[i];
      const depth = parseFloat(el.dataset.depth);
      const mx = fx * depth * 50;
      const my = fy * depth * 50;
      el.style.transform = 'translate3d(' + mx + 'px,' + my + 'px,0)';
    }

    clockWrap.style.transform =
      'translate(-50%,-50%) translate3d(' + (fx * -12) + 'px,' + (fy * -12) + 'px,0) ' +
      'perspective(900px) rotateY(' + (fx * 3.5) + 'deg) rotateX(' + (fy * -3.5) + 'deg)';
    smokeLayer.style.transform = 'translate3d(' + (fx * 18) + 'px,' + (fy * 18) + 'px,0)';

    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
</body>
</html>
